apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: aws-load-balancer-controller
      version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: aws-lbc
        namespace: flux-system
  install:
    createNamespace: false
  values:
    clusterName: demo-eks
    region: us-east-1
    vpcId: vpc-047effc79cdc0ce3c
    serviceAccount:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::459119164101:role/eks-alb-controller
