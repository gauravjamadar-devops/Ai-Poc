apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: eks-charts
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: aws-load-balancer-controller
      version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: eks-charts
        namespace: flux-system
  install:
    createNamespace: false
  values:
    clusterName: demo-eks   # <-- Ensure this matches your actual cluster name
    region: us-east-1       # <-- Update to your AWS region
