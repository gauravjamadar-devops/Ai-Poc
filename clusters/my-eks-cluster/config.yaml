apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/my-eks-cluster/apps   # <-- Change this to target your apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system                     # <-- Use the root repo source directly
